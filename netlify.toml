# Netlify configuration for the Fuel Consumption frontend.
# Documentação: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # O frontend é estático puro — sem build step.
  publish = "frontend"

[build.environment]
  NODE_VERSION = "18"

# ----------------------------------------------------------------------------
# Security & cache headers
# ----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# HTML não deve ser cacheado agressivamente (pra pegar updates rápido)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JS, CSS e Chart.js do CDN: cache de 1 ano
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ----------------------------------------------------------------------------
# Proxy reverso pra API (opcional, mas recomendado)
#
# Descomente o bloco abaixo e troque "seuusuario" pelo seu username do
# PythonAnywhere pra:
#   1. O frontend usar URL relativa "/api/v1/fuel/..." (sem precisar
#      digitar nada na primeira vez)
#   2. CORS some do radar (mesma origem = sem preflight)
#   3. A URL do back-end fica escondida do público
# ----------------------------------------------------------------------------
# [[redirects]]
#   from = "/api/*"
#   to = "https://seuusuario.pythonanywhere.com/api/:splat"
#   status = 200
#   force = false
#
# Se habilitar o proxy acima, troque também o DEFAULT_API no
# frontend/app.js pra "" (string vazia) — o JS vai usar URL relativa.

# ----------------------------------------------------------------------------
# SPA fallback (não estritamente necessário, mas inofensivo)
# ----------------------------------------------------------------------------
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ----------------------------------------------------------------------------
# Contexto pra branch previews e production
# ----------------------------------------------------------------------------
[context.production]
  command = "echo 'Static site, no build needed'"

[context.deploy-preview]
  command = "echo 'Static site, no build needed'"
